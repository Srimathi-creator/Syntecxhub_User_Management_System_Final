<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>User Management System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <div class="container mt-5">

    <h1 class="text-center mb-4">
      User Management System
    </h1>
    

<p class="text-center text-muted">
  Full Stack CRUD Application using Node.js, Express.js, MongoDB & Bootstrap
</p>

    <div class="card p-4 mb-4">

      <form id="userForm">

        <div class="mb-3">
          <label>Name</label>
          <input
            type="text"
            id="name"
            class="form-control"
            required
          >
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input
            type="email"
            id="email"
            class="form-control"
            required
          >
        </div>

        <div class="mb-3">
          <label>Age</label>
          <input
            type="number"
            id="age"
            class="form-control"
            required
          >
        </div>

        <button
          type="submit"
          class="btn btn-primary"
        >
          Add User
        </button>

      </form>

    </div>

    <table class="table table-bordered">

      <thead>

        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Age</th>
          <th>Actions</th>
        </tr>

      </thead>

      <tbody id="userTable">

      </tbody>

    </table>

  </div>

  <script src="./js/app.js"></script>

</body>
</html>
